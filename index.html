<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // --- KONFIGURASI API KEY CANVAS ---
        const apiKey = ""; // Otomatis terisi di lingkungan Canvas
        
        // --- DATABASE HIRARKI ILP ---
        const ilpHierarchy = {
            "KLASTER 1: MANAJEMEN": {
                "Program 1: Penyelenggaraan Manajemen Puskesmas": {
                    "Kegiatan: Perencanaan (P1)": ["1. Tim Perencanaan Puskesmas", "2. Analisis Situasi & SMD", "3. Perumusan Masalah", "4. Penyusunan RUK & RPK"],
                    "Kegiatan: Penggerakan (P2)": ["1. Lokakarya Mini Bulanan", "2. Lokakarya Mini Tribulanan"],
                    "Kegiatan: Penilaian Kinerja (P3)": ["1. Audit Internal & Supervisi", "2. Tinjauan Manajemen", "3. Penilaian Kinerja (PKP)"]
                },
                "Program 2: Pengelolaan Sumber Daya": {
                    "Kegiatan: Keuangan": ["1. Penyusunan RKA", "2. Penatausahaan Keuangan", "3. Verifikasi & SPJ"],
                    "Kegiatan: SDM": ["1. Administrasi Kepegawaian", "2. Analisis Beban Kerja", "3. Pengembangan Kompetensi"],
                    "Kegiatan: Aset & Sarpras": ["1. Inventarisasi Aset", "2. Pemeliharaan Rutin", "3. Kalibrasi Alat"],
                    "Kegiatan: Farmasi & BMHP": ["1. Perencanaan LPLPO", "2. Penerimaan & Penyimpanan", "3. Pendistribusian"]
                },
                "Program 3: Penyelenggaraan PMKP": {
                    "Kegiatan: Perencanaan Mutu": ["1. Area Prioritas Klinis", "2. Indikator Mutu (INM/IMPP)"],
                    "Kegiatan: Peningkatan Kinerja": ["1. Validasi Data Internal", "2. PDSA/PDCA"],
                    "Kegiatan: Manajemen Risiko": ["1. Identifikasi Risiko", "2. Register Risiko", "3. FMEA"],
                    "Kegiatan: Keselamatan Pasien": ["1. Monitoring 6 SKP", "2. Pelaporan IKP", "3. Investigasi & RCA"],
                    "Kegiatan: PPI": ["1. Kewaspadaan Standar", "2. Surveilans HAIs", "3. Bundles PPI"],
                    "Kegiatan: K3": ["1. Pemeriksaan Pegawai", "2. Penanganan Kecelakaan Kerja", "3. Penyediaan APD"],
                    "Kegiatan: MFK": ["1. Keamanan Fasilitas", "2. Manajemen B3 & Limbah", "3. Manajemen Utilitas & APAR"]
                },
                "Program 4: Sistem Informasi": {
                    "Kegiatan: Manajemen SI": ["1. SIMPUS & ASIK", "2. Validasi SatuSehat", "3. PWS Dashboard"]
                }
            },
            "KLASTER 2: IBU DAN ANAK": {
                "Program 1: Kes Ibu Hamil, Bersalin, Nifas": {
                    "Kegiatan: ANC Terpadu": ["1. Pemeriksaan 10T", "2. Skrining Triple Eliminasi", "3. USG Dokter"],
                    "Kegiatan: Kelas Ibu Hamil": ["1. Edukasi & Senam Hamil"],
                    "Kegiatan: Persalinan Normal": ["1. Pertolongan Persalinan", "2. Stabilisasi Rujukan Ibu"],
                    "Kegiatan: Pelayanan Nifas": ["1. Pelayanan KF 1-4", "2. KB Pasca Salin"]
                },
                "Program 2: Kes Balita & Pra Sekolah": {
                    "Kegiatan: Neonatal Esensial": ["1. Kunjungan KN 1-3", "2. Skrining Hipotiroid (SHK)"],
                    "Kegiatan: Tumbuh Kembang": ["1. Pemantauan SDIDTK", "2. Pemantauan Gizi (Stunting)"],
                    "Kegiatan: Imunisasi Rutin": ["1. Imunisasi Dasar Bayi", "2. Imunisasi Lanjutan"]
                },
                "Program 3: Kes Anak Sekolah & Remaja": {
                    "Kegiatan: Skrining Anak Sekolah": ["1. Penjaringan Kesehatan", "2. Imunisasi BIAS"],
                    "Kegiatan: Pelayanan Remaja": ["1. PKPR", "2. TTD Remaja Putri"]
                }
            },
            "KLASTER 3: USIA DEWASA DAN LANJUT USIA": {
                "Program 1: Kes Dewasa & Lansia": {
                    "Kegiatan: Skrining PTM": ["1. Obesitas & Hipertensi", "2. Diabetes Melitus", "3. Kanker (SADANIS/IVA)", "4. Skrining Jiwa"],
                    "Kegiatan: Penyakit Menular": ["1. Skrining TBC", "2. Malaria & IMS"]
                },
                "Program 2: Kes Khusus Dewasa": {
                    "Kegiatan: Reproduksi & Catin": ["1. Pelayanan Catin", "2. Skrining Layak Hamil"],
                    "Kegiatan: Pekerja": ["1. Penyakit Akibat Kerja (PAK)"]
                },
                "Program 3: Kes Khusus Lansia": {
                    "Kegiatan: Pelayanan Geriatri": ["1. Skrining ICOPE", "2. Perawatan Lansia Ketergantungan"]
                }
            },
            "KLASTER 4: PENYAKIT MENULAR": {
                "Program 1: Surveilans": {
                    "Kegiatan: Pemantauan Data": ["1. Analisis PWS", "2. Pelaporan SKDR < 24 Jam"]
                },
                "Program 2: Pengendalian & Respon": {
                    "Kegiatan: Pelacakan & KLB": ["1. Pelacakan Kontak (PE)", "2. Respon KLB & Imunisasi ORI"],
                    "Kegiatan: Kesling": ["1. Inspeksi Kesling (IKL)", "2. Pengendalian Vektor"]
                }
            },
            "LINTAS KLASTER": {
                "Program 1: Gawat Darurat": {
                    "Kegiatan: IGD": ["1. Triase", "2. Resusitasi & Stabilisasi", "3. Rujukan Definitif"]
                },
                "Program 2: Kefarmasian": {
                    "Kegiatan: Farmasi Klinis": ["1. Pelayanan Resep", "2. PIO & Konseling", "3. Pemantauan MESO"]
                },
                "Program 3: Laboratorium": {
                    "Kegiatan: Pemeriksaan Lab": ["1. Pengambilan Spesimen", "2. Pemeriksaan Klinis", "3. Mutu Lab (PMI/PME)"]
                }
            }
        };

        // --- SISTEM PUSAT AI DENGAN EXPONENTIAL BACKOFF & ERROR HANDLING ---
        const callGeminiAPI = async (textPrompt, additionalParts = [], useSearch = false) => {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const parts = [{ text: textPrompt }, ...additionalParts];
            const body = { contents: [{ parts }] };
            if (useSearch) body.tools = [{ google_search: {} }];

            const delays = [1000, 2000, 4000, 8000, 16000];
            let lastError = null;

            for (let i = 0; i < 6; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });

                    let data;
                    try {
                        data = await response.json();
                    } catch (err) {
                        throw new Error(`Gagal membaca respons dari server. Status: ${response.status}`);
                    }

                    if (!response.ok) {
                        throw new Error(data.error?.message || `HTTP Error: ${response.status}`);
                    }

                    if (data.candidates && data.candidates[0]) {
                        return data.candidates[0].content?.parts?.[0]?.text || "";
                    }
                    
                    throw new Error("Format respons tidak dikenali dari AI. Silakan coba lagi.");
                } catch (error) {
                    lastError = error;
                    // Berhenti mencoba jika error berkaitan dengan autentikasi
                    if (error.message.includes('API key not valid') || error.message.includes('API key is invalid') || error.message.includes('400')) {
                        throw new Error("API Key internal tidak valid atau kuota habis.");
                    }
                    
                    if (i < 5) {
                        console.log(`Percobaan AI ${i + 1} gagal. Menunggu ${delays[i]}ms...`);
                        await new Promise(res => setTimeout(res, delays[i]));
                    }
                }
            }
            throw new Error(`Gagal memuat AI setelah beberapa percobaan: ${lastError?.message || 'Tidak diketahui'}`);
        };

        const App = () => {
            const [activeTahap, setActiveTahap] = useState('tahap1');
            const [activeSubMenu, setActiveSubMenu] = useState('kak_komprehensif'); 
            const [toastMsg, setToastMsg] = useState('');
            const [isPrinting, setIsPrinting] = useState(false);

            // State Utama Data
            const [formDataKAK, setFormDataKAK] = useState({
                namaFaskes: 'Puskesmas XYZ', tahun: '2026', latarBelakangTerpadu: '', lingkupAudit: []
            });

            // State Input Unit & Kriteria
            const [selKlaster, setSelKlaster] = useState('');
            const [selProgram, setSelProgram] = useState('');
            const [selKegiatan, setSelKegiatan] = useState('');
            const [selSubKegiatan, setSelSubKegiatan] = useState('');
            const [selInfoTambahan, setSelInfoTambahan] = useState('');
            const [selMasalahSpesifik, setSelMasalahSpesifik] = useState('');
            
            const [kriteriaArahan, setKriteriaArahan] = useState('');
            const [aiKriteriaList, setAiKriteriaList] = useState([]);
            const [selectedKriteria, setSelectedKriteria] = useState([]);
            const [selStandarManual, setSelStandarManual] = useState('');
            const [selMetode, setSelMetode] = useState(['Wawancara', 'Observasi', 'Telaah Dokumen']);
            const [selInstrumen, setSelInstrumen] = useState('');

            // Loading States
            const [loadingUnit, setLoadingUnit] = useState(false);
            const [loadingKriteria, setLoadingKriteria] = useState(false);
            const [loadingInstrumen, setLoadingInstrumen] = useState(false); 
            const [loadingInstrumenIdx, setLoadingInstrumenIdx] = useState(null); 
            const [loadingTerpadu, setLoadingTerpadu] = useState(false);
            const [loadingKAK, setLoadingKAK] = useState(false);

            // State Dokumen KAK
            const [kakParts, setKakParts] = useState({ part1: '', part2: '', part3: '' });
            const [selectedPart, setSelectedPart] = useState('part1');
            const [customPromptKAK, setCustomPromptKAK] = useState('');

            const docPreview = [kakParts.part1, kakParts.part2, kakParts.part3].filter(Boolean).join('\n\n');

            const isReadyToTambah = selKlaster && selProgram && selKegiatan && selSubKegiatan && selMasalahSpesifik.trim();

            const resetFormInputs = () => {
                setSelSubKegiatan(''); setSelInfoTambahan(''); setSelMasalahSpesifik('');
                setKriteriaArahan(''); setAiKriteriaList([]); setSelectedKriteria([]); setSelStandarManual('');
                setSelMetode(['Wawancara', 'Observasi', 'Telaah Dokumen']); setSelInstrumen('');
            };

            const showAlert = (msg) => setToastMsg(msg);

            const handleKlasterChange = (e) => { setSelKlaster(e.target.value); setSelProgram(''); setSelKegiatan(''); resetFormInputs(); };
            const handleProgramChange = (e) => { setSelProgram(e.target.value); setSelKegiatan(''); resetFormInputs(); };
            const handleKegiatanChange = (e) => { setSelKegiatan(e.target.value); resetFormInputs(); };

            // AI 1: Masalah Unit
            const handleAutoFillUnit = async () => {
                if (!selKegiatan || !selSubKegiatan) return showAlert("Pilih 'Kegiatan' dan 'Sub Kegiatan' terlebih dahulu.");
                setLoadingUnit(true);
                const infoContext = selInfoTambahan.trim() !== '' ? `\nInformasi Tambahan/Temuan: ${selInfoTambahan}` : '';
                const prompt = `Sebagai auditor mutu Puskesmas, buatkan 1 paragraf ringkas latar belakang MASALAH SPESIFIK untuk audit pada:\nUnit: ${selKegiatan}\nFokus: ${selSubKegiatan}${infoContext}\nLangsung tulis narasinya tanpa pengantar.`;

                try {
                    const text = await callGeminiAPI(prompt);
                    setSelMasalahSpesifik(text.trim());
                } catch (error) {
                    showAlert(`Gagal menganalisa masalah:\n${error.message}`);
                } finally { setLoadingUnit(false); }
            };

            // AI 2: Kriteria Audit (Checklist)
            const handleGenerateKriteria = async () => {
                if (!selSubKegiatan) return showAlert("Pilih unit terlebih dahulu.");
                setLoadingKriteria(true);
                const prompt = `Berikan 4-5 saran ringkas "Standar/Kriteria Acuan" (pedoman, SOP, regulasi) untuk:\nUnit: ${selKegiatan} - ${selSubKegiatan}\nMasalah: ${selMasalahSpesifik}\nArahan: ${kriteriaArahan}\nBerikan HANYA daftar dengan awalan strip (-).`;

                try {
                    const text = await callGeminiAPI(prompt);
                    const list = text.split('\n').filter(line => line.trim().startsWith('-')).map(line => line.replace(/^-\s*/, '').trim());
                    setAiKriteriaList(list.length > 0 ? list : text.split('\n').filter(line => line.trim().length > 0));
                } catch (error) {
                    showAlert(`Gagal memuat kriteria:\n${error.message}`);
                } finally { setLoadingKriteria(false); }
            };

            const toggleKriteria = (item) => setSelectedKriteria(prev => prev.includes(item) ? prev.filter(k => k !== item) : [...prev, item]);
            const toggleMetode = (metode) => setSelMetode(prev => prev.includes(metode) ? prev.filter(m => m !== metode) : [...prev, metode]);

            // AI 3: Judul Instrumen
            const handleGenerateInstrumen = async () => {
                if (!selSubKegiatan || selMetode.length === 0) return showAlert("Pilih unit dan minimal 1 metode audit.");
                setLoadingInstrumen(true);
                const prompt = `Tentukan JUDUL Instrumen Audit untuk:\nUnit: ${selSubKegiatan}\nMetode Audit: ${selMetode.join(', ')}\nKriteria: ${[...selectedKriteria, selStandarManual].join(', ')}\nBerikan nama instrumen yang logis dan singkat dipisahkan koma.`;

                try {
                    const text = await callGeminiAPI(prompt);
                    setSelInstrumen(text.trim());
                } catch (error) {
                    showAlert(`Gagal menghasilkan judul:\n${error.message}`);
                } finally { setLoadingInstrumen(false); }
            };

            // Tambah Target
            const tambahLingkup = () => {
                if (!isReadyToTambah) {
                    return showAlert("Lengkapi pilihan Unit dan isi 'Masalah Spesifik' terlebih dahulu sebelum menambah target!");
                }
                const finalStandar = [...selectedKriteria, selStandarManual.trim()].filter(Boolean).map(item => item.startsWith('-') ? item : `- ${item}`).join('\n');
                const finalMetode = selMetode.join(', ');

                const newItem = { 
                    klaster: selKlaster, program: selProgram, kegiatan: selKegiatan, subKegiatan: selSubKegiatan,
                    masalahSpesifik: selMasalahSpesifik,
                    auditor: '', standar: finalStandar, metode: finalMetode, instrumen: selInstrumen || 'Daftar tilik ILP', 
                    jadwalSem1: '', jadwalSem2: '', ket: '', bulanPelaksanaan: [],
                    instrumenManual: '', instrumenFileName: '', instrumenFileMime: '', instrumenFileBase64: '', useBrowsing: false, hasilInstrumen: ''
                };
                
                if (!formDataKAK.lingkupAudit.some(item => item.subKegiatan === selSubKegiatan)) {
                    setFormDataKAK({ ...formDataKAK, lingkupAudit: [...formDataKAK.lingkupAudit, newItem] });
                    resetFormInputs();
                } else { showAlert('Sub Kegiatan ini sudah ada di dalam daftar target audit!'); }
            };

            const hapusLingkup = (index) => {
                const newList = [...formDataKAK.lingkupAudit]; newList.splice(index, 1);
                setFormDataKAK({...formDataKAK, lingkupAudit: newList});
            };

            const updateLingkupField = (index, field, value) => {
                const newList = [...formDataKAK.lingkupAudit]; newList[index][field] = value;
                setFormDataKAK({...formDataKAK, lingkupAudit: newList});
            };

            const toggleBulan = (idx, bulan) => {
                const newList = [...formDataKAK.lingkupAudit];
                const arr = newList[idx].bulanPelaksanaan || [];
                newList[idx].bulanPelaksanaan = arr.includes(bulan) ? arr.filter(b => b !== bulan) : [...arr, bulan];
                setFormDataKAK({...formDataKAK, lingkupAudit: newList});
            };

            // File Upload Handler
            const handleFileChange = (idx, e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 5 * 1024 * 1024) return showAlert("Ukuran file maksimal 5MB.");
                const reader = new FileReader();
                reader.onloadend = () => {
                    const newList = [...formDataKAK.lingkupAudit];
                    newList[idx].instrumenFileBase64 = reader.result;
                    newList[idx].instrumenFileMime = file.type;
                    newList[idx].instrumenFileName = file.name;
                    setFormDataKAK({...formDataKAK, lingkupAudit: newList});
                };
                reader.readAsDataURL(file);
            };

            // AI 4: Detail Instrumen (Tabel Checklist)
            const handleGenerateInstrumenDetail = async (idx) => {
                const item = formDataKAK.lingkupAudit[idx];
                setLoadingInstrumenIdx(idx);
                
                let promptText = `Buatkan ISI instrumen audit detail (tabel) untuk:\n- Unit: ${item.kegiatan} - ${item.subKegiatan}\n- Masalah: ${item.masalahSpesifik}\n- Kriteria: ${item.standar.replace(/\n/g, ', ')}\n- Metode: ${item.metode}\n- Judul Instrumen: ${item.instrumen}`;
                if (item.instrumenManual) promptText += `\n\nREFERENSI INTERNAL/SOP:\n${item.instrumenManual}\nPerhatikan referensi ini.`;
                promptText += `\n\nTUGAS: Buat format Tabel Markdown. Jika observasi/dokumen: No | Aspek (Fakta/Bukti) | Ya | Tidak | Ket. Jika wawancara: No | Pertanyaan Wawancara | Jawaban. Hasilkan langsung tabelnya.`;

                const additionalParts = [];
                if (item.instrumenFileBase64) {
                    additionalParts.push({ inlineData: { data: item.instrumenFileBase64.split(',')[1], mimeType: item.instrumenFileMime } });
                }

                try {
                    const text = await callGeminiAPI(promptText, additionalParts, item.useBrowsing);
                    updateLingkupField(idx, 'hasilInstrumen', text.trim());
                } catch (error) {
                    showAlert(`Gagal membuat tabel instrumen:\n${error.message}`);
                } finally { setLoadingInstrumenIdx(null); }
            };

            // AI 5: Latar Belakang KAK
            const handleAutoFillTerpadu = async () => {
                if (formDataKAK.lingkupAudit.length === 0) return showAlert('Tambahkan target audit terlebih dahulu dengan mengklik tombol "Tambah Target KAK" pada bagian 1 (Pemilihan Unit).');
                setLoadingTerpadu(true);
                const probs = formDataKAK.lingkupAudit.map(item => `Unit: ${item.subKegiatan}\nMasalah: ${item.masalahSpesifik}`).join('\n\n');
                const prompt = `RANGKUM masalah unit berikut menjadi 1-2 paragraf "Latar Belakang KAK Audit Internal" yang terpadu.\n${probs}\nLangsung tulis narasi tanpa pengantar.`;

                try {
                    const text = await callGeminiAPI(prompt);
                    setFormDataKAK(prev => ({ ...prev, latarBelakangTerpadu: text.trim() }));
                } catch (error) {
                    showAlert(`Gagal merangkum latar belakang:\n${error.message}`);
                } finally { setLoadingTerpadu(false); }
            };

            // AI 6: KAK Per Bab
            const handleGenerateKAKPart = async () => {
                if(formDataKAK.lingkupAudit.length === 0 || !formDataKAK.latarBelakangTerpadu.trim()) {
                    return showAlert('Mohon lengkapi Daftar Target (Klik "Tambah Target KAK") dan Latar Belakang Utama terlebih dahulu sebelum menyusun Bab KAK.');
                }
                
                setLoadingKAK(true);
                const tgts = formDataKAK.lingkupAudit.map((item, i) => `${i + 1}. Klaster: ${item.klaster} | Sub: ${item.subKegiatan} | Masalah: ${item.masalahSpesifik}`).join('\n');
                let ctx = `Data:\n- Faskes: ${formDataKAK.namaFaskes}\n- Latar Belakang: ${formDataKAK.latarBelakangTerpadu}\n- Target:\n${tgts}\n`;
                if (customPromptKAK.trim()) ctx += `\nINSTRUKSI PENGGUNA:\n"${customPromptKAK.trim()}"\n`;

                let prompt = '';
                if (selectedPart === 'part1') prompt = `Buatkan BAGIAN AWAL KAK.\n\n${ctx}\n\nSUSUN HANYA BAB BERIKUT (Markdown):\nI. Pendahuluan\nII. Latar Belakang\nIII. Tujuan Audit (Terdiri Tujuan Umum dan Tujuan Khusus. Tujuan Khusus: SATU poin ringkas per sub-kegiatan target).\nHasilkan teks utuhnya saja.`;

                                </h1>
                                {formDataKAK.lingkupAudit.map((item, idx) => (
                                    <div key={idx} style={{marginBottom: '40px', pageBreakInside: 'avoid'}}>
                                        <h3 style={{fontSize: '12pt', fontWeight: 'bold', borderBottom: '1px solid black', paddingBottom: '5px', marginBottom: '10px'}}>{idx + 1}. {item.subKegiatan} ({item.program})</h3>
                                        <table style={{width: '100%', marginBottom: '10px', fontSize: '10pt'}}>
                                            <tbody>
                                                <tr><td style={{width: '150px', verticalAlign: 'top'}}><b>Fokus Masalah</b></td><td style={{verticalAlign: 'top'}}>: {item.masalahSpesifik}</td></tr>
                                                <tr><td style={{width: '150px', verticalAlign: 'top'}}><b>Standar Acuan</b></td><td style={{verticalAlign: 'top'}}>: {item.standar.replace(/\n/g, ', ')}</td></tr>
                                                <tr><td style={{width: '150px', verticalAlign: 'top'}}><b>Metode & Instrumen</b></td><td style={{verticalAlign: 'top'}}>: {item.metode} ({item.instrumen})</td></tr>
                                            </tbody>
                                        </table>
                                        <div className="prose max-w-none mt-4" dangerouslySetInnerHTML={{ __html: item.hasilInstrumen ? marked.parse(item.hasilInstrumen) : '<p><i>Instrumen belum dibuat.</i></p>' }} />
                                    </div>
                                ))}
                            </div>
                        ) : null}
                    </div>

                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
